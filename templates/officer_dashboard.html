{% extends 'base.html' %}

{% block content %}
<h2>Officer Dashboard</h2>

<div id="pending-trips">
    <h3>Pending Trip Authorizations</h3>
    <ul id="pending-trips-list">
        {% for trip in pending_trips %}
            <li>
                {{ trip.date }} - {{ trip.from_location }} to {{ trip.to_location }}
                <form method="POST" action="{{ url_for('officer.authorize_trip', trip_id=trip.id) }}">
                    <button type="submit">Authorize</button>
                </form>
            </li>
        {% endfor %}
    </ul>
</div>

{% endblock %}
